name: PHPStan

on:
  pull_request:
  merge_group:
  push:
    branches:
      - 'renovate/**'

jobs:
  phpstan:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/sgoettsch/docker-phpstan:latest-php8.2@sha256:4774a46b0e87c38d9381bfd490a7d81bfc4a5f9d77bbcc33fe2a55dcf29ea1e7
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Composer
        run: composer install

      - name: PHPStan
        uses: docker://ghcr.io/sgoettsch/docker-phpstan:latest-php8.2@sha256:4774a46b0e87c38d9381bfd490a7d81bfc4a5f9d77bbcc33fe2a55dcf29ea1e7
        with:
          args: analyze --error-format=table /github/workspace
