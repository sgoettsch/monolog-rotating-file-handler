name: PHPStan

on:
  pull_request:
  merge_group:
  push:
    branches:
      - 'renovate/**'

jobs:
  phpstan:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/sgoettsch/docker-phpstan:latest-php8.2@sha256:3012d52a428ec451fa94be67a1fd9b568c01f36ade5e26d3ca74b67378830a3a
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Composer
        run: composer install

      - name: PHPStan
        uses: docker://ghcr.io/sgoettsch/docker-phpstan:latest-php8.2@sha256:3012d52a428ec451fa94be67a1fd9b568c01f36ade5e26d3ca74b67378830a3a
        with:
          args: analyze --error-format=table /github/workspace
