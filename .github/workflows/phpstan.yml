name: PHPStan

on:
  pull_request:
  merge_group:
  push:
    branches:
      - 'renovate/**'

jobs:
  phpstan:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/sgoettsch/docker-phpstan:latest-php8.2@sha256:467f08481f24dfc7e7883de300fbf9f632b209a3a062af3bf9ae07fc57ebc41d
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Composer
        run: composer install

      - name: PHPStan
        uses: docker://ghcr.io/sgoettsch/docker-phpstan:latest-php8.2@sha256:467f08481f24dfc7e7883de300fbf9f632b209a3a062af3bf9ae07fc57ebc41d
        with:
          args: analyze --error-format=table /github/workspace
