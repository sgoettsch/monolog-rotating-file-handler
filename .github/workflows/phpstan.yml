name: PHPStan

on:
  pull_request:
  merge_group:
  push:
    branches:
      - 'renovate/**'

jobs:
  phpstan:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/sgoettsch/docker-phpstan:latest-php8.2@sha256:77eba4b25f253ee988ca94857bff6ed84281410873cb9a0ba27d39551f0cb541
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Composer
        run: composer install

      - name: PHPStan
        uses: docker://ghcr.io/sgoettsch/docker-phpstan:latest-php8.2@sha256:77eba4b25f253ee988ca94857bff6ed84281410873cb9a0ba27d39551f0cb541
        with:
          args: analyze --error-format=table /github/workspace
