name: PHPStan

on:
  pull_request:
  merge_group:
  push:
    branches:
      - 'renovate/**'

jobs:
  phpstan:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/sgoettsch/docker-phpstan:latest-php8.2@sha256:23c183af1cee8eb6639d62c1d112eb8f879da9c8075e452d3ebefb8dc5c7a029
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Composer
        run: composer install

      - name: PHPStan
        uses: docker://ghcr.io/sgoettsch/docker-phpstan:latest-php8.2@sha256:23c183af1cee8eb6639d62c1d112eb8f879da9c8075e452d3ebefb8dc5c7a029
        with:
          args: analyze --error-format=table /github/workspace
