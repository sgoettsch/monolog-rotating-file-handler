name: PHPCS

on:
  pull_request:
  merge_group:
  push:
    branches:
      - 'renovate/**'

jobs:
  phpcs:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/sgoettsch/docker-phpstan:latest-php8.2@sha256:4774a46b0e87c38d9381bfd490a7d81bfc4a5f9d77bbcc33fe2a55dcf29ea1e7
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Composer
        run: composer install

      - name: PHPCS
        run: composer phpcs
